<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGAC Hymn Book</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000814;
color:white;
overflow:hidden;
}

/* SPLASH */
#splash{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000814;
z-index:10;
}

/* BOOK (CSS ANIMATED) */
.book{
width:180px;
height:230px;
background:linear-gradient(145deg,#001a33,#003366);
border-radius:10px;
box-shadow:0 0 40px #00ccff;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-weight:bold;
animation:float 3s infinite;
}

.book span{
color:#00ccff;
text-shadow:0 0 15px #00ccff;
}

/* LOGO WATERMARK */
.logo{
position:absolute;
width:200px;
opacity:0.1;
border-radius:50%;
}

/* CGL TEXT */
.cgl{
position:absolute;
bottom:40px;
font-size:22px;
color:#00ccff;
text-shadow:0 0 20px #00ccff;
}

/* HOME */
#home{
display:none;
padding:20px;
text-align:center;
}

/* FLOAT BOX */
.box{
margin-top:120px;
height:400px;
overflow:auto;
background:rgba(0,50,100,0.2);
border-radius:15px;
box-shadow:0 0 20px #00ccff;
animation:float 4s infinite;
}

/* HYMN LIST */
.item{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.item:hover{
background:#003366;
}

/* NOTES */
.note{
position:absolute;
color:#00ccff;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}
</style>

</head>

<body>

<!-- SPLASH -->
<div id="splash">

<img src="logo.png" class="logo">

<div class="book">
<span>
CGAC<br>
HYMN BOOKS<br>
1 - 757
</span>
</div>

<div class="cgl">CGL MEDIA</div>

</div>

<!-- HOME -->
<div id="home">

<img src="logo.png" class="logo">

<h2 style="color:#00ccff;">HYMN INDEX</h2>

<div class="box" id="list"></div>

<div class="cgl">CGL MEDIA</div>

</div>

<script>

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("home").style.display="block";
document.body.style.overflow="auto";
},3000);

/* CREATE 1 - 757 */
let list=document.getElementById("list");

for(let i=1;i<=757;i++){
let div=document.createElement("div");
div.className="item";
div.innerText="Hymn "+i;

/* REDIRECT */
div.onclick=()=>{
window.location.href=i+".html";
};

list.appendChild(div);
}

/* MUSIC NOTES */
function note(){
let n=document.createElement("div");
n.className="note";
n.innerHTML="♪";
n.style.left=Math.random()*100+"vw";
n.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(n);

setTimeout(()=>n.remove(),8000);
}
setInterval(note,300);

</script>

</body>
</html>
