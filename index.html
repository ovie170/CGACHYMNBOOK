<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CGAC Hymn</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020b2a;
  color: white;
  overflow: hidden;
}

/* Container */
.container {
  position: relative;
  height: 100vh;
}

/* Floating Music Notes */
.note {
  position: absolute;
  top: 100%;
  font-size: 20px;
  color: rgba(77,166,255,0.4);
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-110vh); }
}

/* Watermark */
.watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.05;
  width: 300px;
}

/* Top Section */
.top {
  text-align: center;
  position: absolute;
  width: 100%;
  top: 30%;
  transition: all 1.5s ease;
}

.top.moveUp {
  top: 5%;
}

/* Logo Glow */
.logoGlow {
  width: 100px;
  height: 100px;
  margin: auto;
  border-radius: 50%;
  box-shadow: 0 0 30px #4da6ff;
}

.logoGlow img {
  width: 100%;
}

/* Title */
h1 {
  margin: 10px 0 5px;
  text-shadow: 0 0 10px #4da6ff;
}

.version {
  color: #4da6ff;
}

/* Animated Book */
.book {
  width: 120px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* Hymn List */
.list {
  position: absolute;
  top: 60%;
  width: 100%;
  opacity: 0;
  transition: all 1.5s ease;
  height: 40%;
  overflow-y: auto;
}

.list.show {
  top: 35%;
  opacity: 1;
}

.card {
  margin: 10px 20px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(0,102,255,0.1);
  box-shadow: 0 0 10px #4da6ff;
  display: flex;
  gap: 10px;
}

.card span {
  color: #4da6ff;
}

/* Footer */
.footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: #4da6ff;
  text-shadow: 0 0 10px #4da6ff;
}
</style>
</head>

<body>

<div class="container">

  <!-- Floating Notes -->
  <script>
    for (let i = 0; i < 15; i++) {
      const note = document.createElement("div");
      note.className = "note";
      note.innerText = "🎵";
      note.style.left = (i * 7) + "%";
      note.style.animationDelay = (i * 0.5) + "s";
      document.body.appendChild(note);
    }
  </script>

  <!-- Watermark -->
  <img src="logo.png" class="watermark" />

  <!-- Top Section -->
  <div class="top" id="top">
    <div class="logoGlow">
      <img src="logo.png" />
    </div>

    <h1>CGAC HYMN BOOKS</h1>
    <div class="version">version 1 - 757</div>

    <img src="hymn_book.png" class="book" />
  </div>

  <!-- Hymn List -->
  <div class="list" id="list"></div>

  <!-- Footer -->
  <div class="footer">CGL MEDIA</div>

</div>

<script>
const hymns = [];
for (let i = 1; i <= 50; i++) {
  hymns.push("Hymn " + i);
}

const list = document.getElementById("list");

hymns.forEach((hymn, i) => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <span>${i + 1}</span>
    <p>${hymn}</p>
  `;

  list.appendChild(card);
});

// Animate splash → index
setTimeout(() => {
  document.getElementById("top").classList.add("moveUp");
  document.getElementById("list").classList.add("show");
}, 1500);
</script>

</body>
</html>
