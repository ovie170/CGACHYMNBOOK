<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGAC Hymn Book</title>

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #0A192F, #020C1B);
  color: #EAF6FF;
  overflow: hidden;
}

/* ===== SPLASH ===== */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #020C1B;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* BOOK ANIMATION */
.book {
  width: 90px;
  height: 70px;
  position: relative;
  perspective: 800px;
}

.page {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #00CFFF;
  transform-origin: left;
  animation: flip 2s infinite;
}

.page:nth-child(2) { animation-delay: 0.3s; }
.page:nth-child(3) { animation-delay: 0.6s; }

@keyframes flip {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(-180deg); }
}

.title {
  margin-top: 20px;
  font-size: 26px;
  font-weight: bold;
  animation: fadeIn 2s ease-in-out;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
}

/* ===== MAIN ===== */
#app {
  display: none;
  text-align: center;
  padding: 20px;
  overflow-y: auto;
  height: 100vh;
}

/* ===== WATERMARK LOGO ===== */
.logo {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  opacity: 0.08;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* ===== GLOW TEXT ===== */
.glow-text {
  margin-top: 20px;
  font-size: 20px;
  color: #00CFFF;
  text-shadow: 0 0 10px #00CFFF, 0 0 20px #00CFFF;
}

/* ===== GLASS BUTTON ===== */
.glass-btn {
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,207,255,0.3);
  color: #fff;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.glass-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00CFFF;
}

/* ===== MUSIC + STARS ===== */
.symbol {
  position: fixed;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10vh); opacity: 1; }
  to { transform: translateY(110vh); opacity: 0; }
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="book">
    <div class="page"></div>
    <div class="page"></div>
    <div class="page"></div>
  </div>
  <div class="title">CGAC HYMN BOOK</div>
  <div class="subtitle">English & Yoruba (1 – 757)</div>
</div>

<!-- MAIN -->
<div id="app">

  <!-- WATERMARK -->
  <img src="logo.png" class="logo">

  <!-- BRAND -->
  <div class="glow-text">CGL MEDIA</div>

  <!-- LANGUAGE SELECT -->
  <div class="glass-btn" onclick="openLang('english')">
    🇬🇧 English Hymns (1 – 757)
  </div>

  <div class="glass-btn" onclick="openLang('yoruba')">
    🇳🇬 Yoruba Hymns (1 – 757)
  </div>

</div>

<script>

/* SPLASH */
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("app").style.display = "block";
}, 3000);

/* LANGUAGE CLICK */
function openLang(lang) {
  alert("Open " + lang + " hymns page (next step)");
}

/* CREATE MUSIC + STARS */
function createSymbols() {
  let icons = ["🎵", "✨", "⭐"];
  for (let i = 0; i < 40; i++) {
    let s = document.createElement("div");
    s.className = "symbol";
    s.innerText = icons[Math.floor(Math.random() * icons.length)];
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (3 + Math.random() * 6) + "s";
    document.body.appendChild(s);
  }
}
createSymbols();

</script>

</body>
</html>
